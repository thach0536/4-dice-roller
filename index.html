<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 四面骰模擬器 (3D 4-Sided Die Roller)</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css">

  <!-- Import map for Three.js and addons -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- Background elements for visual richness -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <main class="container">
      <!-- 3D Canvas Area -->
      <div id="canvas-container-outer">
        <div id="canvas-container"></div>
        <div id="canvas-loader" class="loader">
          <div class="spinner"></div>
          <p>正在載入 3D 引擎...</p>
        </div>
        
        <!-- Result Overlay -->
        <div id="result-overlay" class="hidden">
          <div class="result-card">
            <span class="result-label">骰出結果</span>
            <div class="result-value-container">
              <span id="result-value" class="result-value">-</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Control Panel -->
      <section class="control-panel glass">
        <header class="app-header">
          <h1>3D 四面骰模擬器</h1>
          <p class="subtitle">3D 4-Sided Die Roller</p>
        </header>

        <!-- Instructions -->
        <div class="instructions">
          <p><span class="highlight">操作說明：</span>在畫面上<strong>按住滑鼠左鍵並拖曳(使用手機瀏覽的話就按住畫面拖曳)</strong>可以旋轉視角，<strong>滾動滾輪</strong>可以縮放骰子。按下下方按鈕即可擲骰子！</p>
        </div>

        <!-- Controls Row 1: Actions -->
        <div class="controls-actions">
          <button id="roll-button" class="btn btn-primary" aria-label="擲骰子">
            <svg class="icon-dice" viewBox="0 0 24 24" width="24" height="24">
              <!-- Custom Dice SVG -->
              <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5l7.5 3.75L12 12 4.5 8.25 12 4.5zM4 9.5l7 3.5v7.5l-7-3.5V9.5zm9 11v-7.5l7-3.5v7.5l-7 3.5z" fill="currentColor"/>
            </svg>
            <span>擲骰子</span>
          </button>
        </div>

        <!-- Controls Row 2: Camera & Audio -->
        <div class="controls-utility">
          <div class="btn-group">
            <button id="btn-reset" class="btn btn-secondary" title="重設視角">重設視角</button>
            <button id="btn-top" class="btn btn-secondary" title="俯視骰子">俯視圖</button>
            <button id="btn-bottom" class="btn btn-secondary" title="仰視骰子">仰視圖</button>
          </div>
          
          <button id="sound-toggle" class="btn btn-icon" aria-label="切換音效" title="切換音效">
            <svg class="icon-volume" id="volume-icon-on" viewBox="0 0 24 24" width="20" height="20">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/>
            </svg>
            <svg class="icon-volume hidden" id="volume-icon-off" viewBox="0 0 24 24" width="20" height="20">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/>
            </svg>
          </button>
        </div>

        <!-- Controls Row 3: Design Styles -->
        <div class="controls-theme">
          <span class="theme-label">骰子材質：</span>
          <div class="theme-options">
            <button class="theme-btn active" data-theme="neon-blue" style="--theme-color: #00f3ff;" title="霓虹藍"></button>
            <button class="theme-btn" data-theme="ruby-red" style="--theme-color: #ff0077;" title="紅寶石"></button>
            <button class="theme-btn" data-theme="emerald-green" style="--theme-color: #00ffaa;" title="祖母綠"></button>
            <button class="theme-btn" data-theme="golden-sun" style="--theme-color: #ffcc00;" title="烈陽金"></button>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer-credit">
      <p>Powered by Three.js & Antigravity</p>
    </footer>
  </div>

  <!-- Main JavaScript -->
  <script type="module" src="app.js"></script>
</body>
</html>
